openapi: 3.1.0
info:
  title: GoCluster Repository Retrieval Action
  description: Read-only authenticated API for retrieving current public GoCluster repository files by source map, troubleshooting index, repo-relative path, bundle, approved raw GitHub URL, bounded line window, directory listing, or bounded filename discovery. Full-file content is capped at 140000 characters, bundles are capped at 12 files, related_paths are capped at 80, line windows are capped at 400 lines, directory listings are capped at 80 entries, and filename discovery is capped at 80 results. The GPT routes through repo-derived routes, symptom_routes, and related_paths, then retrieves authoritative files before answering.
  version: 4.5.0

servers:
  - url: https://gocluster-docs-action.n2wq-api.workers.dev

security:
  - bearerAuth: []

paths:
  /version:
    get:
      operationId: getVersion
      summary: Get service status
      description: Returns Worker status, repository identity, branch, retrieval backend, and entrypoint path.
      responses:
        "200":
          description: Version response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
        "401":
          description: Missing or invalid bearer token

  /entrypoint:
    get:
      operationId: getEntrypoint
      summary: Retrieve the GoCluster custom GPT crawl entrypoint
      description: Retrieves customgpt/source-map.md, including discovered related_paths for follow-up retrieval.
      responses:
        "200":
          description: Retrieved entrypoint file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "401":
          description: Missing or invalid bearer token
        "404":
          description: Entrypoint file not found

  /source-map:
    get:
      operationId: getSourceMap
      summary: Retrieve the GoCluster source map
      description: Retrieves customgpt/source-map.md, including discovered related_paths for follow-up retrieval.
      responses:
        "200":
          description: Retrieved source map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "401":
          description: Missing or invalid bearer token
        "404":
          description: Source map not found

  /troubleshooting-index:
    get:
      operationId: getTroubleshootingIndex
      summary: Retrieve the GoCluster troubleshooting index
      description: Retrieves customgpt/troubleshooting-index.md, including discovered related_paths for follow-up retrieval.
      responses:
        "200":
          description: Retrieved troubleshooting index
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "401":
          description: Missing or invalid bearer token
        "404":
          description: Troubleshooting index not found

  /external-authorities:
    get:
      operationId: getExternalAuthorities
      summary: Retrieve approved external authorities
      description: Retrieves customgpt/external-authorities.md for approved Go, GitHub, Linux/systemd, and PowerShell references.
      responses:
        "200":
          description: Retrieved external authorities document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "401":
          description: Missing or invalid bearer token
        "404":
          description: External authorities document not found

  /list-dir:
    get:
      operationId: listDir
      summary: List one safe GoCluster repository directory
      description: Lists safe retrievable files and subdirectories for bounded repo-driven discovery. Use after a package README or route points to a package neighborhood but not the exact source file.
      parameters:
        - name: path
          in: query
          required: false
          description: Repo-relative directory path such as telnet, spot, rbn, or pathreliability. Empty path lists the repository root.
          schema:
            type: string
      responses:
        "200":
          description: Directory listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectoryResponse"
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Path is not safe for discovery
        "404":
          description: Directory not found

  /find-files:
    get:
      operationId: findFiles
      summary: Find safe GoCluster repository files by filename substring
      description: Searches repository file paths by bounded filename/path substring only. This is not full-text search. Use it to discover likely source or test files before retrieving them with getDoc.
      parameters:
        - name: query
          in: query
          required: true
          description: Case-insensitive filename or path substring using letters, digits, dot, underscore, slash, or dash.
          schema:
            type: string
            maxLength: 64
        - name: path
          in: query
          required: false
          description: Optional repo-relative directory prefix such as telnet or spot.
          schema:
            type: string
      responses:
        "200":
          description: Filename discovery results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FindFilesResponse"
        "400":
          description: Missing or invalid query
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Path is not safe for discovery

  /doc:
    get:
      operationId: getDoc
      summary: Retrieve one safe GoCluster repository file
      description: Retrieves a single safe repo-relative file path or approved raw GitHub URL. Use related_paths from prior responses to decide follow-up paths.
      parameters:
        - name: path
          in: query
          required: false
          description: Repo-relative path such as telnet/README.md or pathreliability/predictor.go.
          schema:
            type: string
        - name: url
          in: query
          required: false
          description: Approved raw GitHub URL under https://raw.githubusercontent.com/N2WQ/GoCluster/main/.
          schema:
            type: string
        - name: base
          in: query
          required: false
          description: Optional base repo path used to resolve relative links such as ../spot/spot.go.
          schema:
            type: string
        - name: start_line
          in: query
          required: false
          description: Optional 1-based start line for bounded retrieval from large files. Defaults to 1 when line_count is provided without start_line.
          schema:
            type: integer
            minimum: 1
        - name: line_count
          in: query
          required: false
          description: Optional number of lines to retrieve, maximum 400. Defaults to 200 when start_line is provided.
          schema:
            type: integer
            minimum: 1
            maximum: 400
      responses:
        "200":
          description: Retrieved file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "400":
          description: Missing or invalid path
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Path is not safe for retrieval
        "404":
          description: Path not found

  /file:
    get:
      operationId: getFile
      summary: Retrieve one safe GoCluster repository file
      description: Alias of getDoc. Retrieves a single safe repo-relative file path or approved raw GitHub URL.
      parameters:
        - name: path
          in: query
          required: false
          description: Repo-relative path such as telnet/README.md or pathreliability/predictor.go.
          schema:
            type: string
        - name: url
          in: query
          required: false
          description: Approved raw GitHub URL under https://raw.githubusercontent.com/N2WQ/GoCluster/main/.
          schema:
            type: string
        - name: base
          in: query
          required: false
          description: Optional base repo path used to resolve relative links such as ../spot/spot.go.
          schema:
            type: string
        - name: start_line
          in: query
          required: false
          description: Optional 1-based start line for bounded retrieval from large files. Defaults to 1 when line_count is provided without start_line.
          schema:
            type: integer
            minimum: 1
        - name: line_count
          in: query
          required: false
          description: Optional number of lines to retrieve, maximum 400. Defaults to 200 when start_line is provided.
          schema:
            type: integer
            minimum: 1
            maximum: 400
      responses:
        "200":
          description: Retrieved file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileResponse"
        "400":
          description: Missing or invalid path
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Path is not safe for retrieval
        "404":
          description: Path not found

  /bundle:
    get:
      operationId: getBundle
      summary: Retrieve multiple safe GoCluster repository files
      description: Retrieves multiple safe repo-relative paths in one response. Use this only after discovering concrete paths from related_paths. The Worker returns an error instead of a partial file bundle if any requested path fails.
      parameters:
        - name: paths
          in: query
          required: false
          description: Comma-separated repo-relative file paths.
          schema:
            type: string
        - name: path
          in: query
          required: false
          description: Optional repeated repo-relative file path parameter.
          schema:
            type: array
            items:
              type: string
            style: form
            explode: true
      responses:
        "200":
          description: Retrieved file bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BundleResponse"
        "400":
          description: Missing paths
        "401":
          description: Missing or invalid bearer token
        "403":
          description: One requested path is not safe for retrieval
        "404":
          description: One requested path was not found
        "502":
          description: GitHub retrieval failed for one requested path

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Configure the GPT action with the same bearer token stored in the Worker secret binding GOCLUSTER_DOCS_ACTION_TOKEN.

  schemas:
    VersionResponse:
      type: object
      properties:
        service:
          type: string
        status:
          type: string
        repo:
          type: string
        branch:
          type: string
        backend:
          type: string
        entrypoint:
          type: string
        auth:
          type: string
        retrieved_at:
          type: string
        message:
          type: string
      required:
        - service
        - status
        - repo
        - branch
        - backend
        - entrypoint
        - auth
        - retrieved_at
        - message

    FileResponse:
      type: object
      properties:
        repo:
          type: string
        branch:
          type: string
        path:
          type: string
        source_url:
          type: string
        auth:
          type: string
        retrieved_at:
          type: string
        kind:
          type: string
        header:
          type: string
        related_paths:
          type: array
          items:
            $ref: "#/components/schemas/RelatedPath"
        routes:
          type: array
          description: Structured routes parsed from customgpt/source-map.md when that file is retrieved.
          items:
            $ref: "#/components/schemas/SourceMapRoute"
        symptom_routes:
          type: array
          description: Structured symptom routes parsed from customgpt/troubleshooting-index.md when that file is retrieved.
          items:
            $ref: "#/components/schemas/SymptomRoute"
        truncated:
          type: boolean
          description: True when the returned content was capped by the 140000-character response limit.
        source_truncated:
          type: boolean
          description: True when the original file is larger than the full-file response cap, even if a bounded line window was returned.
        sliced:
          type: boolean
          description: True when start_line or line_count produced a bounded line window.
        line_start:
          type: integer
        line_end:
          type: integer
        line_count:
          type: integer
        total_lines:
          type: integer
        limits:
          $ref: "#/components/schemas/RetrievalLimits"
        content:
          type: string
      required:
        - repo
        - branch
        - path
        - source_url
        - auth
        - retrieved_at
        - kind
        - header
        - related_paths
        - truncated
        - source_truncated
        - sliced
        - line_start
        - line_end
        - line_count
        - total_lines
        - limits
        - content

    RetrievalLimits:
      type: object
      properties:
        max_file_chars:
          type: integer
        max_bundle_files:
          type: integer
        max_related_paths:
          type: integer
        default_line_window_lines:
          type: integer
        max_line_window_lines:
          type: integer
      required:
        - max_file_chars
        - max_bundle_files
        - max_related_paths
        - default_line_window_lines
        - max_line_window_lines

    DiscoveryLimits:
      type: object
      properties:
        max_dir_entries:
          type: integer
        max_find_results:
          type: integer
        max_find_query_chars:
          type: integer
      required:
        - max_dir_entries
        - max_find_results
        - max_find_query_chars

    DirectoryEntry:
      type: object
      properties:
        type:
          type: string
        path:
          type: string
        source_url:
          type: string
        api_url:
          type: string
        kind:
          type: string
        size:
          type:
            - integer
            - "null"
      required:
        - type
        - path

    DirectoryResponse:
      type: object
      properties:
        repo:
          type: string
        branch:
          type: string
        auth:
          type: string
        retrieved_at:
          type: string
        path:
          type: string
        api_url:
          type: string
        entry_count:
          type: integer
        truncated:
          type: boolean
        limits:
          $ref: "#/components/schemas/DiscoveryLimits"
        entries:
          type: array
          items:
            $ref: "#/components/schemas/DirectoryEntry"
      required:
        - repo
        - branch
        - auth
        - retrieved_at
        - path
        - api_url
        - entry_count
        - truncated
        - limits
        - entries

    FindFileEntry:
      type: object
      properties:
        path:
          type: string
        source_url:
          type: string
        kind:
          type: string
        size:
          type:
            - integer
            - "null"
      required:
        - path
        - source_url
        - kind
        - size

    FindFilesResponse:
      type: object
      properties:
        repo:
          type: string
        branch:
          type: string
        auth:
          type: string
        retrieved_at:
          type: string
        query:
          type: string
        path:
          type: string
        api_url:
          type: string
        result_count:
          type: integer
        truncated:
          type: boolean
        limits:
          $ref: "#/components/schemas/DiscoveryLimits"
        files:
          type: array
          items:
            $ref: "#/components/schemas/FindFileEntry"
      required:
        - repo
        - branch
        - auth
        - retrieved_at
        - query
        - path
        - api_url
        - result_count
        - truncated
        - limits
        - files

    RelatedPath:
      type: object
      properties:
        path:
          type: string
        source_url:
          type: string
        text:
          type: string
        context:
          type: string
      required:
        - path
        - source_url
        - text
        - context

    RoutePath:
      type: object
      properties:
        path:
          type: string
        source_url:
          type: string
        text:
          type: string
      required:
        - path
        - source_url
        - text

    SourceMapRoute:
      type: object
      properties:
        topic:
          type: string
        primary_path:
          type: string
        primary_source_url:
          type: string
        supporting_paths:
          type: array
          items:
            $ref: "#/components/schemas/RoutePath"
      required:
        - topic
        - primary_path
        - primary_source_url
        - supporting_paths

    SymptomRoute:
      type: object
      properties:
        symptom:
          type: string
        first_checks:
          type: string
        route_paths:
          type: array
          items:
            $ref: "#/components/schemas/RoutePath"
        do_not_guess:
          type: string
      required:
        - symptom
        - first_checks
        - route_paths
        - do_not_guess

    BundleResponse:
      type: object
      properties:
        repo:
          type: string
        branch:
          type: string
        auth:
          type: string
        retrieved_at:
          type: string
        requested_paths:
          type: array
          items:
            type: string
        file_count:
          type: integer
        files:
          type: array
          items:
            $ref: "#/components/schemas/FileResponse"
      required:
        - repo
        - branch
        - auth
        - retrieved_at
        - requested_paths
        - file_count
        - files
