# Canonical spot taxonomy for modes and EVENT families.
# Operators may add modes/events here and restart the cluster.
modes:
  - name: CW
    display: CW
    filter_visible: true
    default_filter_allowed: true
    cc_shortcut: true
    comment_tokens: [CW, CWT]
    pskreporter_route: normal
    path_reliability_ingest: true
    archive_retention_class: default
    report_format: plain_db
    bare_numeric_report: true
    source_skew_correction: true
    call_correction_profile: standard
    frequency_averaging: true
    custom_scp_bucket: cw
    path_reliability_bucket: CW
    path_reliability_offset_mode: CW

  - name: SSB
    display: SSB
    filter_visible: false
    comment_tokens: [SSB]
    voice_by_frequency: true
    path_reliability_bucket: SSB
    path_reliability_offset_mode: SSB

  - name: USB
    display: USB
    filter_visible: true
    default_filter_allowed: true
    comment_tokens: [USB]
    archive_retention_class: default
    call_correction_profile: voice
    custom_scp_bucket: voice
    path_reliability_bucket: SSB
    path_reliability_offset_mode: SSB

  - name: LSB
    display: LSB
    filter_visible: true
    default_filter_allowed: true
    comment_tokens: [LSB]
    archive_retention_class: default
    call_correction_profile: voice
    custom_scp_bucket: voice
    path_reliability_bucket: SSB
    path_reliability_offset_mode: SSB

  - name: RTTY
    display: RTTY
    filter_visible: true
    default_filter_allowed: true
    cc_shortcut: true
    comment_tokens: [RTTY]
    pskreporter_route: normal
    path_reliability_ingest: true
    archive_retention_class: default
    report_format: plain_db
    bare_numeric_report: true
    source_skew_correction: true
    call_correction_profile: standard
    frequency_averaging: true
    custom_scp_bucket: rtty
    path_reliability_bucket: RTTY
    path_reliability_offset_mode: RTTY

  - name: FT8
    display: FT8
    filter_visible: true
    cc_shortcut: true
    comment_tokens: [FT8, FT-8]
    pskreporter_route: normal
    path_reliability_ingest: true
    mode_inference_seed: true
    ft_dial_canonicalization: true
    ft_confidence:
      enabled: true
      quiet_gap_seconds_key: ft8_quiet_gap_seconds
      hard_cap_seconds_key: ft8_hard_cap_seconds
    archive_retention_class: ft
    report_format: signed_db
    bare_numeric_report: true
    custom_scp_bucket: ft8
    path_reliability_bucket: FT8
    path_reliability_offset_mode: FT8

  - name: FT4
    display: FT4
    filter_visible: true
    cc_shortcut: true
    comment_tokens: [FT4, FT-4]
    pskreporter_route: normal
    path_reliability_ingest: true
    mode_inference_seed: true
    ft_dial_canonicalization: true
    ft_confidence:
      enabled: true
      quiet_gap_seconds_key: ft4_quiet_gap_seconds
      hard_cap_seconds_key: ft4_hard_cap_seconds
    archive_retention_class: ft
    report_format: signed_db
    bare_numeric_report: true
    custom_scp_bucket: ft4
    path_reliability_bucket: FT4
    path_reliability_offset_mode: FT4

  - name: FT2
    display: FT2
    filter_visible: true
    cc_shortcut: true
    comment_tokens: [FT2, FT-2]
    pskreporter_route: normal
    ft_dial_canonicalization: true
    ft_confidence:
      enabled: true
      quiet_gap_seconds_key: ft2_quiet_gap_seconds
      hard_cap_seconds_key: ft2_hard_cap_seconds
    archive_retention_class: ft
    report_format: signed_db
    custom_scp_bucket: ft2

  - name: MSK144
    display: MSK144
    filter_visible: true
    comment_tokens: [MSK, MSK144, MSK-144]
    pskreporter_route: normal
    confidence_filter_exempt: true
    archive_retention_class: default
    bare_numeric_report: true

  - name: PSK
    display: PSK
    filter_visible: true
    comment_tokens: [PSK]
    variants: [PSK31, PSK63, PSK125]
    pskreporter_route: normal
    path_reliability_ingest: true
    confidence_filter_exempt: true
    archive_retention_class: default
    path_reliability_bucket: PSK
    path_reliability_offset_mode: PSK

  - name: JS8
    display: JS8
    filter_visible: true
    comment_tokens: [JS8]
    mode_inference_seed: true
    archive_retention_class: default

  - name: SSTV
    display: SSTV
    filter_visible: true
    comment_tokens: [SSTV]
    archive_retention_class: default

  - name: WSPR
    display: WSPR
    filter_visible: false
    comment_tokens: [WSPR]
    pskreporter_route: path_only
    path_reliability_ingest: true
    path_reliability_bucket: WSPR
    path_reliability_offset_mode: WSPR

  - name: UNKNOWN
    display: UNKNOWN
    synthetic: true
    filter_visible: true
    default_filter_allowed: true
    blank_mode_token: true

events:
  - name: LLOTA
    display: LLOTA
    filter_visible: true
    standalone_tokens: [LLOTA]
    reference_prefixes: [LLOTA-]
    reference_suffix: alnum_hyphen

  - name: IOTA
    display: IOTA
    filter_visible: true
    standalone_tokens: [IOTA]
    reference_prefixes: [IOTA-]
    reference_suffix: alnum_hyphen

  - name: POTA
    display: POTA
    filter_visible: true
    standalone_tokens: [POTA]
    reference_prefixes: [POTA-]
    reference_suffix: alnum_hyphen

  - name: SOTA
    display: SOTA
    filter_visible: true
    standalone_tokens: [SOTA]
    reference_prefixes: [SOTA-]
    reference_suffix: alnum_hyphen

  - name: WWFF
    display: WWFF
    filter_visible: true
    standalone_tokens: [WWFF]
    reference_prefixes: [WWFF-]
    reference_suffix: alnum_hyphen
