# Final region-aware frequency classification used only after:
#   1. explicit mode on the spot,
#   2. recent trusted DX+frequency-bucket evidence,
#   3. learned/seeded digital-frequency inference.
#
# Classes:
#   cw_safe: frequency-only inference may emit CW
#   voice_default: frequency-only inference may emit the configured USB/LSB
#   mixed: do not infer mode from frequency
#
# Product policy overrides:
# - 60m stays mixed in all regions.
# - 6m stays mixed in all regions.
# - Unknown region never emits voice_default; it may only use the conservative
#   cross-region CW-safe intersections below.
voice_mode_by_band:
  "160m": LSB
  "80m": LSB
  "40m": LSB
  "20m": USB
  "17m": USB
  "15m": USB
  "12m": USB
  "10m": USB

unknown_region_cw_safe:
  "160m":
    - {from_khz: 1810.0, to_khz: 1830.0, class: cw_safe}
  "80m":
    - {from_khz: 3500.0, to_khz: 3535.0, class: cw_safe}
  "40m":
    - {from_khz: 7000.0, to_khz: 7030.0, class: cw_safe}
  "30m":
