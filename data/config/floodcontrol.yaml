# Shared-ingest flood control. This stage runs before primary dedupe.
flood_control:
  # Master switch for the shared-ingest flood controller.
  enabled: true
  # How often the controller emits periodic summary logs for observed decisions.
  log_interval_seconds: 30
  # Counter partitioning strategy. `exact_source_type` keeps MANUAL/RBN/PEER
  # activity isolated so one feed class cannot consume another class's budget.
  partition_mode: exact_source_type

  rails:
    decall:
      # Flood rail keyed by the reporting station (DE call / spotter).
      enabled: true
      # `observe` logs and counts the flood event but still forwards the spot.
      # `suppress` drops it from the shared pipeline.
      # `drop` also drops it, but records a harder operator-facing action.
      action: observe
      # Sliding window used for this rail's event count.
      window_seconds: 60
      # Hard cap on distinct actor keys tracked inside one SourceType partition.
      # When the partition is full, the controller fails open for new actors and
      # records an overflow metric instead of growing memory without bound.
      max_entries_per_partition: 10000
      # Maximum events allowed per SourceType inside `window_seconds`.
      # A value of 0 disables this rail for that SourceType.
      thresholds_per_source_type:
        MANUAL: 8
        UPSTREAM: 8
        PEER: 8
        RBN: 60
        FT8: 60
        FT4: 60
        PSKREPORTER: 60

    source_node:
      # Flood rail keyed by the upstream cluster/node identity.
      enabled: true
      action: observe
      window_seconds: 60
      max_entries_per_partition: 10000
      # Per-SourceType thresholds for repeated traffic from the same SourceNode.
      # Set to 0 when SourceNode is not trusted or not meaningful for that feed.
      thresholds_per_source_type:
        MANUAL: 0
        UPSTREAM: 40
        PEER: 40
        RBN: 0
        FT8: 0
        FT4: 0
        PSKREPORTER: 0

    spotter_ip:
      # Flood rail keyed by peer-supplied SpotterIP. Mainly useful for PEER feed
      # traffic where one origin IP may replay or burst spots aggressively.
      enabled: true
      action: observe
      window_seconds: 60
      max_entries_per_partition: 10000
      # Per-SourceType thresholds for repeated traffic from the same SpotterIP.
      # A value of 0 disables SpotterIP-based enforcement for that feed class.
      thresholds_per_source_type:
        MANUAL: 0
        UPSTREAM: 0
        PEER: 20
        RBN: 0
        FT8: 0
        FT4: 0
        PSKREPORTER: 0

    dxcall:
      # Flood rail keyed by the spotted station (DX call). This is the
      # "hot-target" rail that limits repeated spotting of the same DX call.
      enabled: true
      action: observe
      window_seconds: 60
      max_entries_per_partition: 10000
      # Which threshold profile below is active for this rail.
      active_mode: conservative
      # Threshold profiles for the DXCALL rail. Lower values make the rail more
      # aggressive. Each mode must define every supported SourceType.
      thresholds_by_mode:
        conservative:
          # Conservative profile: highest allowance, least aggressive.
          MANUAL: 25
          UPSTREAM: 25
          PEER: 25
          RBN: 80
          FT8: 80
          FT4: 80
          PSKREPORTER: 80
        moderate:
          # Moderate profile: middle ground between visibility and suppression.
          MANUAL: 15
          UPSTREAM: 15
          PEER: 15
          RBN: 40
          FT8: 40
          FT4: 40
          PSKREPORTER: 40
        aggressive:
          # Aggressive profile: lowest allowance, fastest hot-target suppression.
          MANUAL: 10
          UPSTREAM: 10
          PEER: 10
          RBN: 25
          FT8: 25
          FT4: 25
          PSKREPORTER: 25
