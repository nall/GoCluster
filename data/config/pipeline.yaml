################################################################################
# PIPELINE CONFIGURATION
# Purpose: Spot-quality controls applied in the output pipeline after ingest.
################################################################################

################################################################################
# CALL CORRECTION
# Purpose: Resolver-primary callsign correction for CW/RTTY/USB/LSB.
# Note: FT2/FT4/FT8 are intentionally excluded from resolver mutation, but
#       their bounded corroboration knobs live in this section.
################################################################################
call_correction:
  # ---------------------------------------------------------------------------
  # 1) Enablement
  # Purpose: Turn resolver-primary correction on/off.
  # ---------------------------------------------------------------------------
  enabled: true                       # Master switch (set true to enable)

  # ---------------------------------------------------------------------------
  # 2) Core resolver gates
  # Purpose: Baseline requirements before resolver winner apply.
  # ---------------------------------------------------------------------------
  min_consensus_reports: 2            # Minimum number of corroborating spotters
  min_advantage: 1                    # Candidate must exceed the original by this many spotters
  min_confidence_percent: 45          # Candidate supporters must represent at least this percent of unique spotters
  max_edit_distance: 3                # Max allowed Levenshtein distance between original and replacement
  invalid_action: "broadcast"         # broadcast | suppress when consensus suggests an invalid callsign
  band_state_overrides: []            # Optional per-band activity-state overrides

  # ---------------------------------------------------------------------------
  # 2.5) Call family policy (shared resolver rails)
  # Purpose: Configure slash-vs-bare precedence, truncation matching, and
  #          telnet output suppression for less-specific family variants.
  # ---------------------------------------------------------------------------
  family_policy:
    slash_precedence_min_reports: 2   # Slash-vs-bare precedence threshold (unique slash reporters needed)
    truncation:
      enabled: true                   # Enable containment families (prefix/suffix) for bare calls
      max_length_delta: 2             # Admit truncation families when |len(longer)-len(shorter)| <= this value
      min_shorter_length: 3           # Ignore tiny strings as truncation families
      allow_prefix_match: true        # Match W1AB -> W1ABC style truncations
      allow_suffix_match: true        # Match A1ABC -> WA1ABC style truncations
      relax_advantage:
        enabled: true                 # Allow truncation families to lower min_advantage when rails pass
        min_advantage: 0              # Effective min_advantage when relaxation applies
        require_candidate_validated: true # More-specific form must be SCP/recent-on-band validated
        require_subject_unvalidated: true # Less-specific form must NOT be SCP/recent-on-band validated
      length_bonus:
        enabled: true                 # Capped truncation-length bonus (min_reports gate only)
        max: 2                        # Maximum support bonus (typically length delta capped at 2)
        require_candidate_validated: true # Require SCP/recent-on-band validation for bonus use
        require_subject_unvalidated: true # Require less-specific subject to be unvalidated
      delta2_rails:
        enabled: true                 # Extra safeguards when truncation length delta is 2
        extra_confidence_percent: 5   # Additional confidence requirement for delta-2 truncation candidates
        require_candidate_validated: true # Candidate must be SCP/recent-on-band validated
        require_subject_unvalidated: false # Optional stricter rail; keep false unless needed
    telnet_suppression:
      enabled: true                   # Hide less-specific family variants in telnet output only
      edit_neighbor_enabled: true     # Resolver-contested late-variant suppression for distance-1 neighbors
      window_seconds: 180             # Recency window for suppression cache entries
      max_entries: 20000              # Bounded cache entries across all mode/frequency buckets
      frequency_tolerance_fallback_hz: 1000 # Fallback bucket width when mode tolerance is invalid/missing

  # ---------------------------------------------------------------------------
  # 3) Time windows and frequency windows
  # Purpose: Bound corroboration by freshness and expected same-signal proximity.
  # ---------------------------------------------------------------------------
  recency_seconds: 300                # Supporting spots must be this recent (default for all modes)
  recency_seconds_cw: 0               # Optional override for CW (0 = inherit recency_seconds)
  recency_seconds_rtty: 0             # Optional override for RTTY (0 = inherit recency_seconds)
  frequency_tolerance_hz: 400         # Spots within this frequency window are considered the same signal
  voice_frequency_tolerance_hz: 2000  # USB/LSB consensus window (Hz)

  # ---------------------------------------------------------------------------
  # 4) Frequency guard and resolver neighborhood rails
  # Purpose: Prevent merging distinct nearby signals with comparable support.
  # ---------------------------------------------------------------------------
  freq_guard_min_separation_khz: 0.3  # Skip corrections when winner/runner-up are separated by at least this kHz
  freq_guard_runnerup_ratio: 0.5      # Runner-up must have at least this fraction of winner supporters to block correction
  resolver_neighborhood_enabled: true  # Resolver-primary: compete adjacent resolver buckets before winner apply
  resolver_neighborhood_bucket_radius: 1 # Adjacent bucket radius for neighborhood competition (1 = +/-1 bucket)
  resolver_neighborhood_max_distance: 1 # Neighborhood comparability rail: non-family calls must be within this mode-aware distance
  resolver_neighborhood_allow_truncation_family: true # Allow truncation-family pairs in neighborhood competition even when distance exceeds max_distance
  resolver_recent_plus1_enabled: true  # Resolver-primary only: allow bounded +1 recent corroborator for one-short min_reports cases
  resolver_recent_plus1_min_unique_winner: 3 # Winner must have at least this many recent unique spotters on same band/mode
  resolver_recent_plus1_require_subject_weaker: true # Require winner recent support to be strictly stronger than subject recent support
  resolver_recent_plus1_max_distance: 1 # Apply +1 only for close calls (distance <= this), unless truncation-family allowance applies
  resolver_recent_plus1_allow_truncation_family: true # Allow truncation-family relations to use +1 even when distance exceeds max_distance

  # Conservative Bayesian-style bonus rail for distance-1/2 near-threshold
  # winners. Default OFF; when enabled, caps remain strict (+1 report gate and
  # +1 advantage tie-break only).
  bayes_bonus:
    enabled: true
    weight_distance1_milli: 350
    weight_distance2_milli: 200
    weighted_smoothing_milli: 1000
    recent_smoothing: 2
    obs_log_cap_milli: 350
    prior_log_min_milli: -200
    prior_log_max_milli: 600
    report_threshold_distance1_milli: 450
    report_threshold_distance2_milli: 650
    advantage_threshold_distance1_milli: 700
    advantage_threshold_distance2_milli: 950
    advantage_min_weighted_delta_distance1_milli: 200
    advantage_min_weighted_delta_distance2_milli: 300
    advantage_extra_confidence_distance1: 3
    advantage_extra_confidence_distance2: 5
    require_candidate_validated: true
    require_subject_unvalidated_distance2: true

  # ---------------------------------------------------------------------------
  # 5) Distance models and distance-3 tightening
  # Purpose: Use mode-aware distance and optionally harden distance-3 edits.
  # ---------------------------------------------------------------------------
  distance_model_cw: "morse"          # "plain" = standard Levenshtein, "morse" = Morse-aware (CW only)
  distance_model_rtty: "baudot"       # "plain" = standard Levenshtein, "baudot" = Baudot-aware (RTTY only)
  distance3_extra_reports: 0          # Extra unique supporters required when suggested call is distance 3
  distance3_extra_advantage: 0        # Extra advantage over the subject required when distance 3
  distance3_extra_confidence: 5       # Extra confidence percentage points required when distance 3

  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # 6) Candidate ranking signals (hard gates unchanged)
  # Purpose: Improve candidate ordering/eligibility for near-threshold cases.
  # ---------------------------------------------------------------------------
  confusion_model_enabled: true       # Optional confusion-based ranking for tied top-support candidates
  confusion_model_file: "data/rbn/priors/confusion_model.json" # RBN confusion model JSON path
  confusion_model_weight: 1           # Additive weight for confusion score in tie ranking (0 disables effect)

  recent_band_bonus_enabled: true           # Enable recent-on-band validation cache (same call+band+mode)
  recent_band_window_seconds: 43200         # Look-back window for recent-on-band admission (12h)
  recent_band_record_min_unique_spotters: 3 # Distinct spotters needed to admit call into recent-on-band

  # ---------------------------------------------------------------------------
  # 7) FT corroboration (FT2/FT4/FT8 only)
  # Purpose: Tune bounded burst timing and count-only P/V thresholds for FT.
  #          These knobs affect FT ?/S/P/V tagging even when resolver
  #          correction is disabled for non-FT modes.
  # ---------------------------------------------------------------------------
  p_min_unique_spotters: 2             # Unique reporters required before FT bursts promote from ? to P
  v_min_unique_spotters: 3             # Unique reporters required before FT bursts promote from P to V
  ft8_quiet_gap_seconds: 6             # Extend FT8 burst while corroborators keep arriving inside this gap
  ft8_hard_cap_seconds: 12             # Force-release FT8 burst no later than this many seconds after first arrival
  ft4_quiet_gap_seconds: 5             # FT4 quiet-gap extension window
  ft4_hard_cap_seconds: 10             # FT4 hard cap from first arrival
  ft2_quiet_gap_seconds: 3             # FT2 quiet-gap extension window
  ft2_hard_cap_seconds: 6              # FT2 hard cap from first arrival

  # Custom SCP runtime database for S-floor static membership and correction
  # support.
  custom_scp:
    enabled: true                    # Enable retained static/recent support store
    path: "data/scp"                 # Pebble directory for Custom SCP state
    history_horizon_days: 60         # Recent-support history horizon
    static_horizon_days: 395         # Long-term static-support horizon
    min_snr_db_cw: 4                 # Minimum CW SNR admitted to support store
    min_snr_db_rtty: 3               # Minimum RTTY SNR admitted to support store
    resolver_min_score: 5            # Score required for resolver support
    resolver_min_unique_spotters: 4  # Unique spotters required for resolver support
    resolver_min_unique_h3_cells: 2  # Geographic spread required for resolver support
    stabilizer_min_score: 5          # Score required for stabilizer recent support
    stabilizer_min_unique_spotters: 3 # Unique spotters required for stabilizer support
    stabilizer_min_unique_h3_cells: 2 # Geographic spread required for stabilizer support
    s_floor_min_score: 3             # Score required to promote ? to S
    s_floor_min_unique_spotters_exact: 3 # Exact-call spotters required for S-floor
    s_floor_min_unique_h3_cells_exact: 2 # Exact-call geographic spread for S-floor
    s_floor_min_unique_spotters_family: 5 # Family spotters required for S-floor
    s_floor_min_unique_h3_cells_family: 3 # Family geographic spread for S-floor
    max_keys: 250000                 # Hard cap on retained call/band/mode keys
    max_spotters_per_key: 12         # Hard cap on retained spotter evidence per key
    max_db_bytes: 4294967296         # Approximate Pebble size cap before cleanup pressure
    cleanup_interval_seconds: 600    # Background cleanup cadence
    block_cache_mb: 32               # Pebble block cache size
    bloom_filter_bits: 10            # Bloom filter bits/key
    memtable_size_mb: 32             # Pebble memtable size
    l0_compaction_threshold: 4       # L0 file count before compaction pressure
    l0_stop_writes_threshold: 16     # L0 file count before write throttling

  # ---------------------------------------------------------------------------
  # 8) Telnet stabilizer (recent-heard gate)
  # Purpose: Delay telnet delivery only for delay-eligible confidence glyphs (?, S, P).
  # ---------------------------------------------------------------------------
  stabilizer_enabled: true                  # Delay risky telnet spots for ?, S, P (V/C always pass through)
  stabilizer_delay_seconds: 15              # Hold duration before re-checking recent-on-band support
  stabilizer_max_checks: 5                  # Delay-check cycles before timeout action (includes first check; 1 = current single-check behavior)
  stabilizer_p_delay_confidence_percent: 25 # Delay P when resolver-backed call confidence is below this percent (0 disables)
  stabilizer_p_delay_max_checks: 3          # Retry budget for low-confidence P delay (includes first check; 0 disables)
  stabilizer_ambiguous_max_checks: 0        # Retry budget for resolver split/uncertain delay (0 = use stabilizer_max_checks)
  stabilizer_edit_neighbor_enabled: true    # Delay contested distance-1 variants when stronger/equal edit-neighbor is recent-on-band
  stabilizer_edit_neighbor_max_checks: 0    # Retry budget for edit-neighbor delay (0 = use stabilizer_max_checks)
  stabilizer_edit_neighbor_min_spotters: 2  # Min unique spotters required for edit-neighbor recent support check
  stabilizer_timeout_action: "release"      # release | suppress when still not recent after delay
  stabilizer_max_pending: 20000             # Cap delayed telnet spots in memory; overflow fails open (release)

  # ---------------------------------------------------------------------------
  # 9) Fixed-lag temporal decoder (shared runtime + replay policy)
  # Purpose: Hold selected resolver candidates briefly so late corroboration can
  #          recover recall while bounded gates preserve stability.
  # ---------------------------------------------------------------------------
  temporal_decoder:
    enabled: true                           # Master switch for temporal decoding
    scope: "uncertain_only"                 # uncertain_only | all_correction_candidates
    lag_seconds: 15                         # Primary hold before first decision attempt
    max_wait_seconds: 15                    # Hard cap per held spot before fallback/abstain/bypass
    beam_size: 8                            # Viterbi beam width per step (bounded compute)
    max_obs_candidates: 8                   # Max resolver candidates consumed per observation
    stay_bonus: 120                         # Transition bonus for keeping same winner across steps
    switch_penalty: 160                     # Base penalty when winner changes between steps
    family_switch_penalty: 60               # Reduced penalty for slash/truncation-family switches
    edit1_switch_penalty: 90                # Reduced penalty for edit-distance-1 switches
    min_score: 0                            # Minimum best-path score to commit apply
    min_margin_score: 80                    # Minimum top-vs-runner score margin to commit apply
    overflow_action: "fallback_resolver"    # fallback_resolver | abstain | bypass when full/timeout-low-margin
    max_pending: 25000                      # Global cap for held temporal requests
    max_active_keys: 6000                   # Max simultaneous resolver keys tracked in temporal state
    max_events_per_key: 32                  # Ring depth per resolver key (bounds memory/compute)

  # ---------------------------------------------------------------------------
  # 10) Spotter reliability weights
  # Purpose: Down-weight/ignore corroborators from less reliable spotters.
  # ---------------------------------------------------------------------------
  spotter_reliability_file: "data/rbn/priors/spotter_reliability.txt" # Optional global path with spotter weights (SPOTTER WEIGHT 0-1)
  spotter_reliability_file_cw: "data/rbn/priors/spotter_reliability_cw.txt" # Optional CW override weights (falls back to global when missing)
  spotter_reliability_file_rtty: "data/rbn/priors/spotter_reliability_rtty.txt" # Optional RTTY override weights (falls back to global when missing)
  min_spotter_reliability: 0.87       # Ignore reporters below this reliability weight

  # ---------------------------------------------------------------------------
  # 11) Mode-specific distance weight tuning
  # Purpose: Tune Morse/Baudot edit-cost behavior.
  # ---------------------------------------------------------------------------
  morse_weights:
    insert: 1                         # Cost to insert a dot/dash in Morse patterns
    delete: 1                         # Cost to delete a dot/dash in Morse patterns
    sub: 2                            # Cost to flip dot<->dash in Morse patterns
    scale: 2                          # Multiplier for normalized Morse cost before rounding
  baudot_weights:
    insert: 1                         # Cost to insert a bit in ITA2 patterns
    delete: 1                         # Cost to delete a bit in ITA2 patterns
    sub: 2                            # Cost to flip a bit in ITA2 patterns
    scale: 2                          # Multiplier for normalized ITA2 cost before rounding

  # ---------------------------------------------------------------------------
  # 12) Adaptive refresh and adaptive min-reports
  # Purpose: Track activity states and adjust correction strictness over time.
  # ---------------------------------------------------------------------------
  adaptive_refresh:
    busy_threshold_per_min: 500       # Enter busy when the 10m average exceeds this rate
    quiet_threshold_per_min: 300      # Exit busy after two windows below this rate
    quiet_consecutive_windows: 2      # Windows below quiet threshold required to leave busy
    busy_interval_minutes: 15         # Refresh cadence during busy periods
    quiet_interval_minutes: 45        # Refresh cadence during quiet periods
    min_spots_since_last_refresh: 1000 # Skip refresh when volume since last run is below this
    window_minutes_for_rate: 10       # Window size for computing average rate
    evaluation_period_seconds: 30     # How often to evaluate the rate/state machine

  adaptive_refresh_by_band:
    enabled: true
    quiet_refresh_minutes: 30
    normal_refresh_minutes: 20
    busy_refresh_minutes: 10
    min_spots_since_last_refresh: 500

  adaptive_min_reports:
    enabled: true
    window_minutes: 10
    evaluation_period_seconds: 60
    hysteresis_windows: 2
    groups:
      - name: lowbands
        bands: ["160m", "80m"]
        quiet_below: 30
        busy_above: 75
        quiet_min_reports: 2
        normal_min_reports: 3
        busy_min_reports: 4
      - name: midbands
        bands: ["40m", "20m"]
        quiet_below: 80
        busy_above: 130
        quiet_min_reports: 2
        normal_min_reports: 3
        busy_min_reports: 4
      - name: highbands
        bands: ["15m", "10m"]
        quiet_below: 35
        busy_above: 85
        quiet_min_reports: 2
        normal_min_reports: 3
        busy_min_reports: 4
      - name: others
        bands: ["30m", "17m", "12m", "60m", "6m"]
        quiet_below: 20
        busy_above: 55
        quiet_min_reports: 2
        normal_min_reports: 3
        busy_min_reports: 4


################################################################################
# HARMONIC SUPPRESSION
# Purpose: Drop likely harmonic spots when stronger fundamentals exist nearby.
################################################################################
harmonics:
  enabled: true                       # Suppress harmonics when true
  recency_seconds: 120                # Look-back window for fundamental spots
  max_harmonic_multiple: 3            # Highest harmonic multiple to consider (2 = second harmonic, etc.)
  frequency_tolerance_hz: 500         # Allowed deviation between expected and observed harmonic
  min_report_delta: 6                 # Harmonics must be at least this many dB weaker to drop
  min_report_delta_step: 3            # Additional dB required per harmonic order above the second


################################################################################
# SPOT POLICY
# Purpose: Generic post-protection sanity gates and frequency averaging behavior.
################################################################################
spot_policy:
  max_age_seconds: 300                # Drop spots older than this many seconds (based on spot timestamp)
  frequency_averaging_seconds: 120    # Look-back window for CW/RTTY frequency averaging
  frequency_averaging_tolerance_hz: 500 # Max deviation between reports when averaging
  frequency_averaging_min_reports: 5  # Minimum corroborating reports needed to adjust frequency


################################################################################
# MODE INFERENCE
# Purpose: Infer mode when comments omit explicit mode token.
################################################################################
mode_inference:
  dx_freq_cache_ttl_seconds: 300      # DXcall+frequency cache TTL (seconds)
  dx_freq_cache_size: 50000           # Maximum DXcall+frequency cache entries
  digital_window_seconds: 180         # Corroborator window for digital map (seconds)
  digital_min_corroborators: 5        # Distinct skimmers required to trust a digital mode
  digital_seed_ttl_seconds: 21600     # Seed expiry without explicit refresh (seconds)
  digital_cache_size: 2500            # Maximum digital frequency buckets
