  timeouts:
    login_seconds: 60              # Outbound login timeout
    init_seconds: 60               # Outbound init/handshake timeout
    idle_seconds: 600              # Idle read deadline before reconnect
  backoff:
    base_ms: 2000                  # Reconnect backoff base (ms)
    max_ms: 300000                 # Reconnect backoff max (ms)
  topology:
    db_path: ""                    # Optional topology SQLite path (empty disables)
    retention_hours: 24            # Retention window for topology records
    persist_interval_seconds: 300  # How often to persist topology to disk
  acl:
    allow_ips: []                  # Optional inbound allowlist (CIDRs)
    allow_callsigns: []            # Optional inbound callsign allowlist
