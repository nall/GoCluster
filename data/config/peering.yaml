peering:
  enabled: false                   # Enable DXSpider peering (PC11/PC61/PC92/PC51)
  forward_spots: false             # Peer spot data-plane forwarding; false = receive-only except local DX posts
  local_callsign: "N2WQ-2"         # Our node callsign sent in PC92/PC19 frames
  listen_port: 6300                # Optional inbound listen port for peers
  hop_count: 99                    # Hop limit we advertise and decrement on forward
  node_version: "5457"             # Node version advertised in pc9x init
  node_build: "633"                # Optional build string advertised in pc9x init
  legacy_version: "5401"           # Legacy PC19 version string
  pc92_bitmap: 5                   # Capabilities bitmap in PC92 entries
  node_count: 1                    # Last resort default node count advertised in keepalives
  user_count: 1                    # Last resort default user count advertised in keepalives
  log_keepalive: false             # Emit PC51 keepalive chatter to the console
  log_line_too_long: false         # Log and drop oversized peer lines
  telnet_transport: "native"       # Telnet parser/negotiation backend: native or ziutek
  keepalive_seconds: 600           # PC92K/PC51 heartbeat interval (0 disables)
  config_seconds: 1800             # PC92C config refresh interval (0 disables)
  write_queue_size: 128            # Buffered writes per session before backpressure
  max_line_length: 65536           # Drop lines longer than this to avoid abuse
  pc92_max_bytes: 65536            # Drop PC92 topology frames larger than this (<= max_line_length)
  peers:
    - enabled: true                # Outbound peer definition
      family: "dxspider"           # Peer family: dxspider or ccluster
      direction: "both"            # Allow outbound dial and inbound accept
      host: "dxs.n2wq.com"         # Remote host
      port: 7300                   # Remote port
      password: ""                 # Optional password sent after login callsign
      prefer_pc9x: true            # Prefer PC9x (PC92/PC61) over legacy PC19/PC11
      login_callsign: "N2WQ-2"     # Callsign used to log in to the remote
      remote_callsign: "N2WQ-73"   # Expected remote node callsign
