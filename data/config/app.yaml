# Core app identity and local console UI settings.
server:
  name: "Go Cluster beta\r\n"
  node_id: "N2WQ-2"

stats:
  display_interval_seconds: 60  # How often to print stats to stdout

# Local console UI (applies only to the process console, not telnet clients)
ui:
  mode: "tview-v2"    # ansi | tview | tview-v2 | headless
  refresh_ms: 300     # ANSI redraw cadence; 0 disables redraws
  color: true         # Enable simple ANSI colors for marked-up lines
  clear_screen: true  # Clear the screen each frame (set false to append)
  pane_lines:
    stats: 10         # Lines retained in the stats block
    calls: 9          # Corrected calls history
    unlicensed: 9     # Unlicensed drops history
    harmonics: 9      # Harmonic drops history
    system: 9         # System log history
  v2:
    pages: [overview, ingest, pipeline, events]  # Enabled pages + order
    target_fps: 15                   # Max UI refresh rate
    enable_mouse: false              # Mouse support (terminal dependent)
    keybindings:
      use_alternatives: true         # Enable o/i/p/e navigation

# Optional daily system log files (local time, one file per day).
logging:
  enabled: true
  dir: "data/logs"
  retention_days: 7   # Keep daily logs for this many days
  drop_dedupe_window_seconds: 120  # 0 disables dropped-call log dedupe
