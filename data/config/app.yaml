# Purpose: Core server identity, stats cadence, console UI, and local logging.
# Ownership: deployment/runtime settings.
# Runtime behavior: Required merged runtime config loaded from the active config directory at startup.
# Safe edits: Set node identity, console UI, stats, and logging paths for the local deployment; keep secrets out of public config.
# Source: data/config/README.md.

# Cluster identity used in greetings, logs, and node metadata.
server:
  name: "Go Cluster beta\r\n" # Display name; include protocol line ending when needed by clients.
  node_id: "N0CALL-1"         # Stable cluster node callsign/identifier.

stats:
  display_interval_seconds: 60  # How often to print stats to stdout

# Local console UI (applies only to the process console, not telnet clients)
ui:
  mode: "tview-v2"    # ansi | tview | tview-v2 | headless
  refresh_ms: 300     # ANSI redraw cadence; 0 disables redraws
  color: true         # Enable simple ANSI colors for marked-up lines
  clear_screen: true  # Clear the screen each frame (set false to append)
  pane_lines:
    stats: 10         # Lines retained in the stats block
    calls: 9          # Corrected calls history
    unlicensed: 9     # Unlicensed drops history
    harmonics: 9      # Harmonic drops history
    system: 9         # System log history
  v2:
    pages: [overview, ingest, pipeline, events]  # Enabled pages + order
    target_fps: 15                   # Max UI refresh rate
    event_buffer:
      max_events: 1000               # Hard cap for retained UI event rows
      max_bytes_mb: 1                # Hard cap for retained UI event text
      max_message_bytes: 4096        # Truncate a single event message above this size
      evict_on_byte_limit: true      # Evict oldest events when byte cap is reached
      log_drops: true                # Emit log lines when event rows are dropped/truncated
    debug_buffer:
      max_events: 5000               # Hard cap for retained UI debug rows
      max_bytes_mb: 2                # Hard cap for retained UI debug text
      max_message_bytes: 4096        # Truncate a single debug message above this size
      evict_on_byte_limit: true      # Evict oldest debug rows when byte cap is reached
      log_drops: false               # Keep debug truncation/drop chatter out of the system log
    enable_mouse: false              # Mouse support (terminal dependent)
    keybindings:
      use_alternatives: true         # Enable o/i/p/e navigation

# Optional daily system log files (local time, one file per day).
# Repeated file-log blocks use:
#   dir: output directory for daily files.
#   retention_days: local retention window; 0 inherits the root logging value where supported.
#   dedupe_window_seconds: repeated-event suppression window; 0 disables dedupe for that file.
logging:
  enabled: true
  dir: "data/logs/system" # Root system-log directory.
  retention_days: 7       # Keep daily logs for this many days.
  drop_dedupe_window_seconds: 120  # 0 disables console dropped-event dedupe; dropped_calls may override file dedupe
  dropped_calls:
    enabled: true
    dir: "data/logs/dropped_calls" # Separate daily file for dropped spot categories.
    retention_days: 7
    dedupe_window_seconds: 120
    bad_de_dx: true
    no_license: true
    harmonics: true
  login_attempts:
    enabled: true
    dir: "data/logs/login_attempts"
    retention_days: 7
    dedupe_window_seconds: 120
  reputation_drops:
    enabled: true
    dir: "data/logs/reputation_drops"
    retention_days: 7
    dedupe_window_seconds: 120
  telnet_connections:
    enabled: true
    dir: "data/logs/telnet_connections"
    retention_days: 7
    dedupe_window_seconds: 120
  ingest_connections:
    enabled: true
    dir: "data/logs/ingest_connections"
    retention_days: 7
    dedupe_window_seconds: 120
  peer_connections:
    enabled: true
    dir: "data/logs/peer_connections"
    retention_days: 7
    dedupe_window_seconds: 120
