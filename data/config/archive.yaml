archive:
  # Enable or disable Pebble spot archival.
  enabled: true

  # Pebble database directory path (relative to repo root or absolute).
  db_path: "data/archive/pebble"

  # Async writer backpressure controls.
  queue_size: 5000            # Drops newest when full to protect hot path.
  batch_size: 3000            # Max rows per flush.
  batch_interval_ms: 3000     # Max time to wait before flushing even if batch_size not reached.
  busy_timeout_ms: 1000       # Ignored for Pebble (retained for compatibility).
  preflight_timeout_ms: 3000  # Ignored for Pebble (retained for compatibility).
  synchronous: "off"          # OFF maximizes throughput but loses crash safety; use normal/full for durability.
  auto_delete_corrupt_db: true # When true, deletes the DB if startup integrity checks fail.

  # Retention and cleanup.
  cleanup_interval_seconds: 900    # How often to purge expired rows.
  cleanup_batch_size: 2000         # Max rows per cleanup batch delete.
  cleanup_batch_yield_ms: 50       # Sleep between cleanup batches; 0 disables the yield.
  retention_ft_seconds: 21600      # FT8/FT4 retention window (6h).
  retention_default_seconds: 43200 # Other modes retention window (12h).
